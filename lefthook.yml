pre-commit:
  parallel: true
  commands:
    rust-fmt:
      run: just fmt
      stage_fixed: true
    desktop-tauri-fmt:
      run: just desktop-tauri-fmt
      stage_fixed: true
    desktop-fix:
      run: just desktop-fix
      stage_fixed: true
    web-fix:
      run: just web-fix
      stage_fixed: true
    mobile-fix:
      run: just mobile-fix
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    branch-skew:
      run: ./scripts/check-branch-skew.sh
    rust-tests:
      run: just test-unit
    desktop-check:
      run: just desktop-check
    desktop-test:
      run: just desktop-test
    desktop-tauri-test:
      run: just desktop-tauri-test
    mobile-test:
      run: just mobile-test
