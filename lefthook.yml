pre-commit:
  parallel: true
  commands:
    rust-fmt:
      run: just fmt-check
    desktop-tauri-fmt:
      run: just desktop-tauri-fmt-check
    desktop-check:
      run: just desktop-check
    web-check:
      run: just web-check
    mobile-check:
      run: just mobile-check

pre-push:
  parallel: true
  commands:
    rust-fmt:
      run: just fmt-check
    rust-clippy:
      run: just clippy
    rust-tests:
      run: just test-unit
    desktop-check:
      run: just desktop-check
    desktop-tauri-fmt:
      run: just desktop-tauri-fmt-check
    desktop-build:
      run: just desktop-build
    desktop-tauri-check:
      run: just desktop-tauri-check
    web-check:
      run: just web-check
    web-build:
      run: just web-build
    mobile-check:
      run: just mobile-check
    mobile-test:
      run: just mobile-test
